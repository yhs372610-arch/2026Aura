<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background: white; color: #333; padding-top: 80px; }
        .article-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; line-height: 1.8; }
        h1 { font-size: 2.2em; margin-bottom: 20px; color: #667eea; }
        h2 { font-size: 1.6em; margin-top: 40px; margin-bottom: 15px; border-left: 5px solid #667eea; padding-left: 15px; }
        p { margin-bottom: 20px; font-size: 1.05em; color: #444; }
        .back-home { display: inline-block; margin-top: 30px; color: #667eea; font-weight: bold; text-decoration: none; border: 2px solid #667eea; padding: 10px 20px; border-radius: 25px; transition: all 0.3s; }
        .back-home:hover { background: #667eea; color: white; }
        .color-card { background: #f8f9ff; border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #667eea; }
        .color-card h3 { margin-top: 0; color: #333; font-size: 1.2em; }
        .language-dropdown { position: fixed; top: 20px; right: 20px; z-index: 1000; }
    </style>
</head>
<body>
    <div class="language-dropdown" id="language-dropdown">
        <button class="dropdown-btn" id="dropdown-main-btn"><span class="current-lang-text">🇰🇷 KO</span><span class="arrow-down">▼</span></button>
        <div class="dropdown-content" id="dropdown-menu">
            <button class="lang-option" data-lang="ko">🇰🇷 한국어</button>
            <button class="lang-option" data-lang="en">🇺🇸 English</button>
            <button class="lang-option" data-lang="ja">🇯🇵 日本語</button>
            <button class="lang-option" data-lang="es">🇪🇸 Español</button>
            <button class="lang-option" data-lang="pt">🇵🇹 Português</button>
        </div>
    </div>

    <div class="article-container">
        <a href="index.html" style="text-decoration: none; color: #999;" data-i18n="about.back">← 테스트로 돌아가기</a>
        <h1 data-i18n="about.title">아우라 컬러란 무엇인가?</h1>
        <p data-i18n="about.p1">많은 사람들이 자신의 '아우라'에 대해 궁금해합니다. 아우라는 라틴어로 '공기', '미풍'을 뜻하며, 심리학과 동양 철학에서는 생명체가 발산하는 고유의 에너지를 의미합니다.</p>

        <h2 data-i18n="about.h2_1">아우라 컬러의 역사와 의미</h2>
        <p data-i18n="about.p2">고대 문명에서는 성인이나 리더 주변에 빛나는 후광을 묘사하곤 했는데, 이것이 현대에 와서는 개인의 성격적 특성과 심리적 상태를 나타내는 지표로 발전했습니다.</p>

        <h2 data-i18n="about.h2_2">6가지 대표 아우라 컬러</h2>
        <div class="color-card"><h3 data-i18n="colors.coolBlue.name"></h3><p data-i18n="colors.coolBlue.description"></p></div>
        <div class="color-card"><h3 data-i18n="colors.solarGold.name"></h3><p data-i18n="colors.solarGold.description"></p></div>
        <div class="color-card"><h3 data-i18n="colors.vampPurple.name"></h3><p data-i18n="colors.vampPurple.description"></p></div>
        <div class="color-card"><h3 data-i18n="colors.forestGreen.name"></h3><p data-i18n="colors.forestGreen.description"></p></div>
        <div class="color-card"><h3 data-i18n="colors.softPink.name"></h3><p data-i18n="colors.softPink.description"></p></div>
        <div class="color-card"><h3 data-i18n="colors.midnightBlack.name"></h3><p data-i18n="colors.midnightBlack.description"></p></div>

        <a href="index.html" class="back-home" data-i18n="about.cta">지금 바로 테스트 시작하기</a>
    </div>

    <footer style="text-align: center; padding: 40px; color: #999; font-size: 0.9em;">
        &copy; 2026 Aura Color Test | <a href="privacy.html" data-i18n="footer.privacy">개인정보처리방침</a>
    </footer>

    <script src="assets/js/languages.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 언어 자동 감지 및 설정
            if (!window.currentLanguage) window.currentLanguage = detectLanguage();
            updatePageLanguage();
            updateLangButtonText(window.currentLanguage);

            const dropdown = document.getElementById('language-dropdown');
            const dropdownBtn = document.getElementById('dropdown-main-btn');
            dropdownBtn.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('active'); });
            
            document.querySelectorAll('.lang-option').forEach(option => {
                option.addEventListener('click', () => {
                    const lang = option.getAttribute('data-lang');
                    window.currentLanguage = lang;
                    updatePageLanguage();
                    updateLangButtonText(lang);
                    dropdown.classList.remove('active');
                });
            });
            document.addEventListener('click', () => { dropdown.classList.remove('active'); });
        });

        function updateLangButtonText(lang) {
            const langMap = { ko: '🇰🇷 KO', en: '🇺🇸 EN', ja: '🇯🇵 JA', es: '🇪🇸 ES', pt: '🇵🇹 PT' };
            document.querySelector('.current-lang-text').textContent = langMap[lang] || lang.toUpperCase();
        }
    </script>
</body>
</html>
